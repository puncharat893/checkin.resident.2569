<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>บันทึกการเข้าออกงาน</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
  <link rel="icon" type="image/x-icon" href="bud.ico">
</head>

<body class="bg-white h-screen">
  <div class="max-w-md mx-auto p-6">
    <div class="bg-slate-800 border rounded-lg text-white text-center mb-4 py-8 px-4">
      <div class="daytime">
        <div id="date"></div>
        <div class="text-5xl font-bold" id="time"></div>
        <input type="date" id="todayInput" name="todayInput" class="hidden" />
        <input type="time" id="currentTime" name="currentTime" class="hidden" />
      </div>
    </div>

    <div id="step1">
      <div class="relative bg-slate-100 p-4 rounded-lg">
        <div id="loadingOverlay" class="hidden absolute top-0 left-0 w-full h-full bg-white/80 flex items-center justify-center z-[1000]">
          <div class="text-center text-gray-800">ค้นหารายชื่อ..</div>
        </div>
        <div id="locationInfo" name="locationInfo" class="bg-white p-4 rounded-lg h-auto overflow-hidden shadow-sm max-w-sm mx-auto ">
          <div class="mb-2">
            <label class="cursor-pointer border border-gray-300 px-4 py-3 rounded-lg w-full flex items-center justify-center">
              <span class="w-3 h-3 rounded-full bg-green-500 mr-2"></span>
              เข้างาน
            </label>
          </div>
          <div class="flex justify-between">
            <p id="latitude" class="text-gray-700 font-medium pb-2">Latitude: </p>
            <p id="longitude" class="text-gray-700 font-medium pb-2">Longitude: </p>
          </div>
          <p id="fullAddress" style="font-size: smaller;">สถานที่</p>
        </div>
        <iframe id="mapIframe" class="p-2 rounded-lg shadow-md h-60 overflow-hidden" width="100%" height="240" frameborder="0" style="border:0;" allowfullscreen="" aria-hidden="false" tabindex="0"></iframe>
        
        <div class="w-full p-2 space-y-6 mt-2">
          <div class="relative">
            <label for="columnBData" class="absolute -top-2 left-3 text-xs bg-slate-100 px-1 text-slate-800 font-semibold">ชื่อ-สกุล</label>
            <input type="text" class="w-full px-4 py-3 text-sm bg-slate-100 border-2 border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-slate-800" id="columnBData" placeholder="ชื่อ-สกุล" name="columnBData" disabled required >
          </div>
        </div>
        <div class="w-full p-2 space-y-6">
          <div class="relative">
            <label for="columnCData" class="absolute -top-2 left-3 text-xs bg-slate-100 px-1 text-slate-800 font-semibold">รหัสนิสิต</label>
            <input type="text" class="w-full px-4 py-3 text-sm bg-slate-100 border-2 border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-slate-800" id="columnCData" placeholder="รหัสนิสิต" name="columnCData" disabled required>
          </div>
        </div>
        <div class="w-full p-2 space-y-6">
          <div class="relative">
            <label for="columnDData" class="absolute -top-2 left-3 text-xs bg-slate-100 px-1 text-slate-800 font-semibold">ชั้นปี/กลุ่ม</label>
            <input type="text" class="w-full px-4 py-3 text-sm bg-slate-100 border-2 border-slate-800 rounded-xl focus:outline-none focus:ring-2 focus:ring-slate-800" id="columnDData" placeholder="ชั้นปี/กลุ่ม" name="columnDData" disabled required>
          </div>
        </div>
        <input type="hidden" id="userId" name="userId" />
        <input type="hidden" id="columnAData" name="columnAData" />
        <input type="hidden" id="latitudeInput" name="latitudeInput">
        <input type="hidden" id="longitudeInput" name="longitudeInput">
        <input type="hidden" id="fullAddressInput" name="fullAddressInput" required>
      </div>

      <div class="flex my-2">
        <input type="hidden" id="jobInput" name="jobInput" value="เข้างาน" required>
      </div>
      <textarea class="w-full border border-gray-300 rounded-lg p-4 text-gray-700" placeholder="Note" id="noteInput"></textarea>
      <div class="bg-slate-800 text-white text-center rounded-lg my-4">
        <button class="p-4 w-full" onclick="nextStep()" id="start-camera-btn">ถัดไป</button>
      </div>
    </div>

    <div id="step2" class="hidden text-center">
      <div class="photo pb-4">
        <center>
          <video id="camera-preview" width="70%" height="auto" autoplay playsinline class="rounded-lg"></video>
        </center>
        <center>
          <img id="preview" width="70%" height="auto" alt="" required class="rounded-lg">
        </center>
        <div class="flex justify-center space-x-4 my-4 px-8">
            <button id="switch-camera-btn" class="py-2 px-4 rounded-lg bg-slate-100 text-black" disabled>
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" color="#000000" fill="none">
                <path d="M15.1667 0.999756L15.7646 2.11753C16.1689 2.87322 16.371 3.25107 16.2374 3.41289C16.1037 3.57471 15.6635 3.44402 14.7831 3.18264C13.9029 2.92131 12.9684 2.78071 12 2.78071C6.75329 2.78071 2.5 6.90822 2.5 11.9998C2.5 13.6789 2.96262 15.2533 3.77093 16.6093M8.83333 22.9998L8.23536 21.882C7.83108 21.1263 7.62894 20.7484 7.7626 20.5866C7.89627 20.4248 8.33649 20.5555 9.21689 20.8169C10.0971 21.0782 11.0316 21.2188 12 21.2188C17.2467 21.2188 21.5 17.0913 21.5 11.9998C21.5 10.3206 21.0374 8.74623 20.2291 7.39023" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
            </button>
          <button class="w-full text-sm text-center py-4 px-4 rounded-lg bg-green-500 text-white" id="capture-btn" disabled>ถ่ายรูป</button>
        </div>
      </div>
      <div class="input-group py-4 flex justify-between space-x-4">
        <button class="w-full text-center p-4 rounded-lg bg-gray-300" onclick="prevStep()">กลับ</button>
        <button id="submitButton" class="w-full text-center p-4 rounded-lg bg-slate-800 text-white" onclick="submitForm()">บันทึกข้อมูล</button>
      </div>
    </div>
    
    <script src="Config.js"></script>
    <script>
      // โค้ดเดิมของคุณทั้งหมด...
      // [ส่วนเริ่มต้น LIFF, fetchData, displayData คงเดิมไว้]
      window.onload = async function () { await initializeLiff(); getLocation(); };
      async function initializeLiff() { try { await liff.init({ liffId: `${LIFF_ID}` }); if (liff.isLoggedIn()) { getUserProfile(); } else { liff.login(); } } catch (error) { console.error('Error:', error); } }
      async function getUserProfile() { try { const profile = await liff.getProfile(); document.getElementById('userId').value = profile.userId; await fetchData(profile.userId); } catch (error) { console.error('Error:', error); } }
      async function fetchData(userId) { try { const response = await fetch(`${WEB_APP_MEMBER_URL}`, { method: 'POST', body: JSON.stringify({ action: 'fetchData', userId: userId }) }); const data = await response.json(); const userRows = data.filter(row => row[1] === userId); if (userRows.length > 0) { userRows.sort((a, b) => new Date(b[6]) - new Date(a[6])); displayData(userRows[0]); } } catch (error) { console.error('Error:', error); } }
      function displayData(row) { document.getElementById('columnBData').value = row[2] || ''; document.getElementById('columnCData').value = row[3] || ''; document.getElementById('columnDData').value = row[4] || ''; }
      function showLoading(isLoading) { const overlay = document.getElementById('loadingOverlay'); if (isLoading) { overlay.classList.remove('hidden'); } else { overlay.classList.add('hidden'); } }

      // --- ส่วนที่แก้ไขให้ข้อมูลเข้าชีตได้ ---
      function submitForm() {
        const url = 'https://script.google.com/macros/s/AKfycbySFpIbXjCtYGHYNAP7ddjEoc1s2FTNBE6n94rTOfV6gnoFnZPhH1Rz9-sJKSoHzcy1sQ/exec';
        Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
        let obj = {
          base64: document.getElementById('preview').src.split("base64,")[1] || '',
          name: document.getElementById('columnBData').value,
          role: document.getElementById('columnCData').value,
          job: document.getElementById('jobInput').value,
          note: document.getElementById('noteInput').value,
          time: document.getElementById('currentTime').value,
          lat: document.getElementById('latitudeInput').value,
          long: document.getElementById('longitudeInput').value,
          address: document.getElementById('fullAddressInput').value,
          user: document.getElementById('userId').value
        };
        fetch(url, { method: "POST", body: JSON.stringify(obj) })
          .then(res => res.text())
          .then(data => { Swal.close(); Swal.fire('สำเร็จ!', 'บันทึกข้อมูลเรียบร้อย', 'success').then(() => liff.closeWindow()); })
          .catch(err => { Swal.close(); Swal.fire('Error!', 'ส่งข้อมูลไม่สำเร็จ', 'error'); });
      }

      // --- ฟังก์ชันอื่นๆ ของคุณ (คงเดิม) ---
      function nextStep() { document.getElementById('step1').style.display = 'none'; document.getElementById('step2').style.display = 'block'; }
      function prevStep() { document.getElementById('step1').style.display = 'block'; document.getElementById('step2').style.display = 'none'; }
      // [เพิ่มฟังก์ชันกล้องและตำแหน่งของคุณไว้ที่เดิมได้เลยค่ะ]
    </script>
  </div>
</body>
</html>
